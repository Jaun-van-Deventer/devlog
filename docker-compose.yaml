services:
  postgres:
    image: postgres:16-alpine
    container_name: devlog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devlog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devlog}
      POSTGRES_DB: ${POSTGRES_DB:-devlog}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devlog} -d ${POSTGRES_DB:-devlog}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:25-alpine
    container_name: devlog-backend
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npx prisma migrate deploy && npm run dev"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-devlog}:${POSTGRES_PASSWORD:-devlog}@postgres:5432/${POSTGRES_DB:-devlog}?schema=public
      PORT: ${PORT:-5000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - ./backend:/app
      - backend-node-modules:/app/node_modules

volumes:
  postgres-data:
  backend-node-modules:
